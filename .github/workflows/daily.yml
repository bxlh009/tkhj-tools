name: Daily Content Generation

on:
  schedule:
    # Beijing 18:00, 21:00, and 00:00 retry windows. Daily guards prevent
    # duplicate Learning or AI publication after the first successful run.
    - cron: '0 10,13,16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set API key
        run: echo "AGNES_API_KEY=${{ secrets.AGNES_API_KEY }}" >> $GITHUB_ENV

      - name: Generate daily content
        run: python scripts/daily_generate.py

      - name: Translate missing guides and rebuild
        run: |
          python scripts/translate_article.py --all
          python site/build.py

      - name: Verify quality gates
        run: |
          python scripts/test_content_quality.py
          python scripts/test_translation.py
          python scripts/audit_adsense_readiness.py

      - name: Commit and push
        run: |
          git config user.name "TKHJ Bot"
          git config user.email "bot@tkhjtools.top"
          git add output/ site/content/ daily_log.jsonl .seen_exam_vars.json .seen_ai_stories.json ai_news_log.jsonl
          git diff --staged --quiet || git commit -m "Daily content $(date +'%Y-%m-%d')"
          git push
